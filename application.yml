spring:
  application:
    name: tn-engineer-jobs
  datasource:
    url: jdbc:postgresql://localhost:5432/tn_jobs_db
    username: postgres
    password: password
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      # or ollama config

server:
  port: 8080

jwt:
  secret: your-super-secret-key-min-512-bits-for-hs512
  expiration: 86400000  # 24h
